<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reistrate en Soy Arte</title>
    <link rel="stylesheet" href="styles/register.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>

    <div class="padre">
        <div class="form-card">
            <h2>Crea tu cuenta</h2>

            <form method="POST" action="php/register.php">
                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" class="form-control" name="nombre">
                </div>
                <div class="mb-3">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" placeholder="ejemplo@gmail.com" name="correo">
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="contrasena">
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" class="form-control" name="confirmar-contrasena">
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="codiciones">
                    <label class="form-check-label">
                        Acepto términos y condiciones
                    </label>
                </div>

                <button class="btn btn-primary w-100" type="submit">
                    Crear cuenta
                </button>
                
                <p class="inicia text-center mb-2">O inicia sesión con</p>

                <div class="social-buttons">
                    <button class="btn-google">
                        <img src="img/google_logo_g_logo_icon_159348.png" alt="google">
                            Google
                    </button>

                    <button class="btn-instagram">
                        <img src="img/logotipo-instagram-gradiente-colorido_1273375-1516.avif" alt="Instagram">
                            Instagram
                    </button>
                </div

            </form>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
