<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
     <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <main class="contenedorLogin"> 
        <h1 class="titulo">¡Bienvenido de Nuevo!</h1>
        <form class="form" method="POST" action="php/login.php">   
            <div class="inputBlock"> 
                <label for="floatingInput" class="labels">Correo Electrónico: </label><br>
                <input type="email" class="inputs" id="floatingInput" placeholder="name@example.com" name="correo">  
            </div> 
            <div class="inputBlock"> 
                <label for="floatingPassword">Contraseña:</label>
                <input type="password" class="form-control" id="floatingPassword" placeholder="Ingresa tu contraseña" name="password"> 
            </div>
            <div>
                <a href="" class="forget-password">¿Olvidaste tu contraseña?</a>
            </div>  
            <div class="inputBlock">
                <button class="btn btn-primary" type="submit">Iniciar Sesión</button> 
                <p class="opciones">------- O -------</p> 
            </div>
        </form> 
        <div class="continue-google">
            <button class="button1" type="submit"> <img src="img/google.png" alt="google">
                Continua con Google</button>
        </div>
        <div class="register">
            <p>¿No tienes una cuenta?</p><a href="">Regristrate aquí</a>
        </div>
    </main>
    
</body>
</html>
